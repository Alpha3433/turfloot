<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurfLoot - Competitive Web3 Gaming</title>
    <meta name="description" content="Real-time multiplayer gaming with blockchain rewards">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #9ca3af;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .button {
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            color: #000;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border-left: 4px solid #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TurfLoot</h1>
        <p>Competitive Web3 Gaming Platform</p>
        <a href="/api/health" class="button">Check API Status</a>
        
        <div class="status">
            <h3>🚀 Deployment Successful</h3>
            <p>The application has been successfully containerized and deployed to Kubernetes.</p>
            <p><strong>Next.js Backend:</strong> Fully operational</p>
            <p><strong>MongoDB Atlas:</strong> Connected</p>
            <p><strong>Build Status:</strong> Optimized for container deployment</p>
        </div>
    </div>

    <script>
        // Simple health check
        fetch('/api')
        .then(response => response.json())
        .then(data => {
            console.log('API Status:', data);
            if (data.message) {
                document.querySelector('.status p:last-child').textContent = 'API Status: ✅ ' + data.message;
            }
        })
        .catch(error => {
            console.error('API Error:', error);
            document.querySelector('.status p:last-child').textContent = 'API Status: ⚠️ Backend Starting...';
        });
    </script>
</body>
</html>
